<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Bank Management System</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="container">

    <h1>🏦 Bank Management System</h1>

    <!-- Create Account Section -->
    <div class="section">
      <h2>Create Account</h2>
      <input id="nameInput" type="text" placeholder="Enter Name">
      <input id="balanceInput" type="number" placeholder="Initial Balance">
      <button id="createBtn">Create Account</button>
    </div>

    <!-- Deposit Section -->
    <div class="section">
      <h2>Deposit Money</h2>
      <input id="depositInput" type="number" placeholder="Enter Amount">
      <button id="depositBtn">Deposit</button>
    </div>

    <!-- Withdraw Section -->
    <div class="section">
      <h2>Withdraw Money</h2>
      <input id="withdrawInput" type="number" placeholder="Enter Amount">
      <button id="withdrawBtn">Withdraw</button>
    </div>

    <!-- Actions -->
    <div class="section">
      <button id="showBtn">Show Account Details</button>
    </div>

    <!-- Output -->
    <div id="output" class="output">
      <p id="message">No account created yet</p>
    </div>

  </div>

  <script src="script.js"></script>

</body>
</html>
