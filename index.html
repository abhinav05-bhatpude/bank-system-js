<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Bank System</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="container">

    <h1>🏦 Bank System</h1>

    <div class="input-section">
      <input id="name" type="text" placeholder="Enter Name">
      <input id="balance" type="number" placeholder="Initial Balance">
    </div>

    <div class="transcation-section">
      <input type="number" id="depositAmount" placeholder="Deposit Amount">
      <button id="depositBtn">Deposit</button>

      <input type="number" id="withdrawAmount" placeholder="Withdraw Amount">
      <button id="withdrawBtn">Withdraw</button>
    </div>

    <div class="button-section">
      <button id="createBtn">Create Account</button>
      <button id="depositBtn">Deposit</button>
      <button id="withdrawBtn">Withdraw</button>
      <button id="showBtn">Show Details</button>
    </div>

    <div id="output" class="output-section">
      <p id="message">Account details will appear here</p>
    </div>

  </div>


</body>
  <script src="script.js"></script>
</html>
